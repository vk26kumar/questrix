version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: questrix_mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: questrix_secret
      MONGO_INITDB_DATABASE: questrix
    volumes:
      - mongodb_data:/data/db
    networks:
      - questrix_network

  redis:
    image: redis:7.2-alpine
    container_name: questrix_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - questrix_network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  questrix_network:
    driver: bridge